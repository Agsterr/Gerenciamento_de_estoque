services:
  postgres:
    image: postgres:15-alpine
    container_name: gerenciamento-postgres
    environment:
      POSTGRES_DB: gerenciamento_estoque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gerenciamento_estoque"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Descomente para acessar o PG pelo host (DBeaver, etc.)
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gerenciamento-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Sobrescreve .env local (localhost) para hostnames Docker
      DB_URL: jdbc:postgresql://postgres:5432/gerenciamento_estoque
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      FLYWAY_ENABLED: "true"
      PORT: "8080"
      CACHE_TYPE: simple
      SPRING_CACHE_TYPE: simple
      SPRING_DATA_REDIS_ENABLED: "false"
      REDIS_HOST: redis
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost}
      # Asaas: ambiente definido por ASAAS_ENVIRONMENT no .env (sandbox | production)
      ASAAS_SANDBOX_API_KEY_FILE: ${ASAAS_SANDBOX_API_KEY_FILE:-/run/secrets/asaas_sandbox_api_key}
      ASAAS_PROD_API_KEY_FILE: ${ASAAS_PROD_API_KEY_FILE:-/run/secrets/asaas_prod_api_key}
      # Mercado Pago legado: sempre teste no Docker enquanto APP_PAYMENT_PROVIDER=asaas
      MERCADOPAGO_ENVIRONMENT: test
    volumes:
      - ./docker/secrets/asaas_sandbox_api_key.txt:/run/secrets/asaas_sandbox_api_key:ro
      - ./docker/secrets/asaas_prod_api_key.txt:/run/secrets/asaas_prod_api_key:ro
    expose:
      - "8080"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/asaas/config >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: gerenciamento-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - app-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.5.2
    container_name: gerenciamento-cloudflared
    depends_on:
      nginx:
        condition: service_started
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    env_file:
      - .env
    network_mode: host
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
