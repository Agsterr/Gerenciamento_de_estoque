
<div class="consumidor-container">
  <h1>Gestão de Consumidores</h1>

  <!-- Campo de busca -->
  <div class="search-container">
    <input
      type="text"
      placeholder="Buscar consumidores"
      [(ngModel)]="searchTerm"
      (input)="applyFilter()"
    />
  </div>

  <!-- Lista de consumidores -->
  <div class="lista-consumidores">
    <h2>Lista de Consumidores</h2>
    <ul>
      <li *ngFor="let consumer of filteredConsumers">
        {{ consumer.nome }} - {{ consumer.cpf }}
      </li>
    </ul>
  </div>
</div>
