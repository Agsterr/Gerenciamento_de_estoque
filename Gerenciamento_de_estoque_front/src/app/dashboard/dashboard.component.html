<div
  class="dashboard-container"
  [class.mobile-module]="isMobile && !isHubRoute"
  [class.mobile-hub]="isMobile && isHubRoute"
>
  <!-- Menu lateral (desktop) -->
  <aside class="dashboard-sidebar" *ngIf="!isMobile" aria-label="Menu do painel">
    <div class="sidebar-brand">
      <i class="fas fa-warehouse"></i>
      <span>Painel ERP</span>
    </div>
    <nav class="sidebar-nav">
      <a
        *ngFor="let item of desktopMenu"
        [routerLink]="navLink(item)"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === 'inicio' }"
        class="sidebar-link"
      >
        <i class="fas" [ngClass]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <div class="dashboard-main">
    <!-- Cabeçalho compacto no mobile (telas de módulo) -->
    <header class="mobile-page-header" *ngIf="isMobile && !isHubRoute">
      <a routerLink="/dashboard/inicio" class="mobile-back" aria-label="Voltar ao início">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h1 class="mobile-page-title">{{ pageTitle }}</h1>
      <button type="button" class="mobile-more-btn" (click)="toggleMoreMenu()" aria-label="Mais opções">
        <i class="fas fa-ellipsis-v"></i>
      </button>
    </header>

    <!-- Hub mobile: só título leve (KPIs ficam no router-outlet / inicio) -->
    <header class="mobile-hub-header" *ngIf="isMobile && isHubRoute">
      <h1>Painel</h1>
      <p>Escolha uma opção abaixo ou use o menu</p>
    </header>

    <!-- Atalhos rápidos só na tela inicial (mobile) -->
    <nav class="mobile-quick-grid" *ngIf="isMobile && isHubRoute" aria-label="Acesso rápido">
      <a
        *ngFor="let item of primaryMobile"
        [routerLink]="navLink(item)"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === 'inicio' }"
        class="quick-tile"
      >
        <i class="fas" [ngClass]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
      <button type="button" class="quick-tile quick-tile-more" (click)="toggleMoreMenu()">
        <i class="fas fa-th"></i>
        <span>Mais</span>
      </button>
    </nav>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Barra inferior fixa (mobile) -->
  <nav class="mobile-bottom-nav" *ngIf="isMobile" aria-label="Navegação principal">
    <a
      *ngFor="let item of primaryMobile"
      [routerLink]="navLink(item)"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.path === 'inicio' }"
      class="bottom-nav-item"
    >
      <i class="fas" [ngClass]="item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
    <button
      type="button"
      class="bottom-nav-item"
      [class.active]="moreMenuOpen"
      (click)="toggleMoreMenu()"
    >
      <i class="fas fa-bars"></i>
      <span>Mais</span>
    </button>
  </nav>

  <!-- Drawer "Mais opções" (mobile) -->
  <div
    class="mobile-more-overlay"
    *ngIf="isMobile && moreMenuOpen"
    (click)="closeMoreMenu()"
    role="presentation"
  ></div>
  <aside
    class="mobile-more-drawer"
    *ngIf="isMobile && moreMenuOpen"
    aria-label="Mais módulos"
  >
    <header class="drawer-header">
      <h2>Mais opções</h2>
      <button type="button" (click)="closeMoreMenu()" aria-label="Fechar">
        <i class="fas fa-times"></i>
      </button>
    </header>
    <nav class="drawer-links">
      <a
        *ngFor="let item of secondaryMenu"
        [routerLink]="navLink(item)"
        routerLinkActive="active"
        class="drawer-link"
        (click)="closeMoreMenu()"
      >
        <i class="fas" [ngClass]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>
</div>
