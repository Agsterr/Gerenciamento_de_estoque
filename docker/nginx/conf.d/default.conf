upstream backend {
    server app:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # API / backend Spring Boot
    location ~ ^/(api|auth|webhooks|admin|actuator|swagger-ui|v3/api-docs|produtos|movimentacoes|usuarios|roles|relatorios|consumidores|categorias|entregas|depositos|fornecedores|pedidos-compra|pedidos-venda|inventario|auditoria|dashboard)(/|$) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }

    # Frontend Angular (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
