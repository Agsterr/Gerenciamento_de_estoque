upstream backend {
    server app:8080;
}

# Cloudflare Tunnel envia X-Forwarded-Proto; localmente o header não existe.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Só redireciona quando Cloudflare/proxy envia X-Forwarded-Proto: http explicitamente.
# Sem header (localhost) não redireciona — evita quebrar dev local.
map $http_x_forwarded_proto $redirect_to_https {
    default 0;
    "http"  1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    if ($redirect_to_https) {
        return 301 https://$host$request_uri;
    }

    # API / backend Spring Boot
    location ~ ^/(api|auth|webhooks|admin|actuator|swagger-ui|v3/api-docs|produtos|movimentacoes|usuarios|roles|relatorios|consumidores|categorias|entregas|depositos|fornecedores|pedidos-compra|pedidos-venda|inventario|auditoria|dashboard)(/|$) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }

    # Frontend Angular (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
