# Configuração local para desenvolvimento
spring.application.name=Gerenciamento_de_estoque

# Porta local
server.port=8081

# Database PostgreSQL (variáveis de ambiente)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway desabilitado para desenvolvimento local
spring.flyway.enabled=false

# JPA/Hibernate para PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret para desenvolvimento
jwt.secret=${JWT_SECRET}

# Swagger habilitado
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Logs
logging.level.root=INFO
logging.level.br.softsistem=DEBUG

# Webhook Secret
mercadopago.webhook.secret=${MERCADOPAGO_WEBHOOK_SECRET:}


# Timezone
spring.jackson.time-zone=America/Sao_Paulo
logging.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# =============================
# CONFIGURAÇÃO DE CACHE
# =============================
# Para usar Redis (após instalação):
# 1. Execute: .\install-redis.ps1 (como administrador)
# 2. Altere as configurações abaixo:
#    spring.cache.type=redis
#    spring.data.redis.enabled=true
# 3. Reinicie a aplicação

# Cache atual: SIMPLES (em memória)
spring.cache.type=simple
spring.data.redis.enabled=false

