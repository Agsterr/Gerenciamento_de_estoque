spring.application.name=Gerenciamento_de_estoque

# =============================
# Server Configuration
# =============================
# Porta dinâmica (Render define $PORT). Default local: 8081
server.port=${PORT:8081}
# Reconhece HTTPS atrás do Nginx/Cloudflare (X-Forwarded-Proto)
server.forward-headers-strategy=native

# =============================
# Database Configuration
# =============================
# Database (Render passa via variáveis de ambiente)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway em produção
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# =============================
# Security Configuration
# =============================
jwt.secret=${JWT_SECRET}

# =============================
# Cache & Redis Configuration
# =============================
# Cache padrão - usa Redis quando disponível, senão usa cache simples
spring.cache.type=${CACHE_TYPE:simple}
spring.cache.redis.time-to-live=1800000

# Redis Configuration (opcional)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# =============================
# Timezone/Locale Configuration
# =============================
# Timezone padrão para serialização Jackson
spring.jackson.time-zone=America/Sao_Paulo
# Ajusta timestamps de logs para o fuso do Brasil
logging.time-zone=America/Sao_Paulo

# =============================
# API Documentation (Swagger)
# =============================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# =============================
# Monitoring & Health Checks
# =============================
management.endpoints.web.exposure.include=health,info,cache
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# =============================
# Payment Provider
# =============================
# asaas (padrão) ou mercadopago (legado, isolado por @ConditionalOnProperty)
app.payment.provider=${APP_PAYMENT_PROVIDER:asaas}

# =============================
# Asaas Configuration
# =============================
# Ambiente: sandbox (teste) ou production
asaas.environment=${ASAAS_ENVIRONMENT:sandbox}
asaas.sandbox.api-key=${ASAAS_SANDBOX_API_KEY:}
asaas.sandbox.api-key-file=${ASAAS_SANDBOX_API_KEY_FILE:}
asaas.prod.api-key=${ASAAS_PROD_API_KEY:}
asaas.prod.api-key-file=${ASAAS_PROD_API_KEY_FILE:}
asaas.webhook.token=${ASAAS_WEBHOOK_TOKEN:}
asaas.payment.callback-enabled=${ASAAS_PAYMENT_CALLBACK_ENABLED:false}

# =============================
# Mercado Pago Configuration (legado — use app.payment.provider=mercadopago)
# =============================
# Ambiente: 'test' (sandbox) ou 'production'. Default test para desenvolvimento.
mercadopago.environment=${MERCADOPAGO_ENVIRONMENT:production}

# URL pública da aplicação (ngrok ou domínio público)
app.public-url=${APP_PUBLIC_URL}

# Credenciais de Teste
mercadopago.test.access.token=${MERCADOPAGO_TEST_ACCESS_TOKEN:}
mercadopago.test.public.key=${MERCADOPAGO_TEST_PUBLIC_KEY:}

# Credenciais de Produção (opcionais - apenas para ambiente de produção)
mercadopago.prod.access.token=${MERCADOPAGO_PROD_ACCESS_TOKEN:}
mercadopago.prod.public.key=${MERCADOPAGO_PROD_PUBLIC_KEY:}

# URLs de redirecionamento
mercadopago.success.url=${MERCADOPAGO_SUCCESS_URL:${APP_PUBLIC_URL}/subscription/success}
mercadopago.cancel.url=${MERCADOPAGO_CANCEL_URL:${APP_PUBLIC_URL}/subscription/cancel}
mercadopago.pending.url=${MERCADOPAGO_PENDING_URL:${APP_PUBLIC_URL}/subscription/pending}

# Webhook
mercadopago.webhook.secret=${MERCADOPAGO_WEBHOOK_SECRET:}

# URL base do checkout de assinaturas (link direto). Em teste usa sandbox.mercadopago.com.br; em prod usa www.mercadopago.com.br.
# Sobrescreva com MERCADOPAGO_SUBSCRIPTION_CHECKOUT_BASE_URL se precisar (ex.: https://www.mercadopago.com.br).
mercadopago.subscription.checkout.base.url=${MERCADOPAGO_SUBSCRIPTION_CHECKOUT_BASE_URL:}

# Configurações de Webhook
webhook.processing.timeout.seconds=30
webhook.executor.core-pool-size=5
webhook.executor.max-pool-size=10
webhook.executor.queue-capacity=100

# Configurações de Monitoramento e Alertas de Webhook
webhook.monitoring.alert.email.enabled=true
webhook.monitoring.alert.webhook.enabled=false
webhook.monitoring.alert.webhook.url=${WEBHOOK_ALERT_URL:}
webhook.alert.email.enabled=true
webhook.alert.webhook.enabled=false
webhook.alert.webhook.url=${WEBHOOK_ALERT_URL:}

# =============================
# Email Configuration
# =============================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.email.from=${EMAIL_FROM}
app.email.from-name=${EMAIL_FROM_NAME:Sistema de Gerenciamento de Estoque}

# =============================
# Subscription Configuration
# =============================
app.subscription.trial-days=15
app.subscription.trial-warning-days=3

# =============================
# Registration & Demo
# =============================
app.registration.enabled=${REGISTRATION_ENABLED:false}
app.demo.enabled=${DEMO_ENABLED:true}
app.demo.org-name=org_demo
app.demo.username=demo
app.demo.password=demo123

# =============================
# Login logs — exportação / arquivo
# =============================
app.login-logs.export-dir=${LOGIN_LOG_EXPORT_DIR:data/log-exports}
app.login-logs.auto-archive-enabled=${LOGIN_LOG_AUTO_ARCHIVE:false}
app.login-logs.auto-archive-retention-days=${LOGIN_LOG_AUTO_ARCHIVE_RETENTION_DAYS:90}
app.login-logs.auto-archive-cron=${LOGIN_LOG_AUTO_ARCHIVE_CRON:0 0 4 * * *}

# =============================
# Logging Configuration
# =============================
logging.level.root=INFO
