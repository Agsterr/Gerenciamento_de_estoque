spring.application.name=Gerenciamento_de_estoque

spring.datasource.url=${TEST_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/gerenciamento_estoque_test}}
spring.datasource.username=${TEST_DB_USER:${DB_USER:postgres}}
spring.datasource.password=${TEST_DB_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

jwt.secret=jwt_secret_de_teste_com_tamanho_minimo_32_chars

spring.cache.type=simple
spring.data.redis.enabled=false

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

mercadopago.environment=test
mercadopago.webhook.secret=
app.public-url=http://localhost:8081
spring.mail.username=test@example.com
spring.mail.password=test-password
app.email.from=test@example.com
app.email.from-name=Sistema Teste
