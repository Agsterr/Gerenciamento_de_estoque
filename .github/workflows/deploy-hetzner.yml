# Deploy automático no Hetzner após push em main.
# Secrets obrigatórios: HETZNER_SSH_KEY, HETZNER_HOST, HETZNER_USER (root).
# Ver docs/CICD.md para configuração única.
name: Deploy to Hetzner

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-hetzner-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Configurar SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          if [ -z "$HETZNER_SSH_KEY" ] || [ -z "$HETZNER_HOST" ]; then
            echo "Defina os secrets HETZNER_SSH_KEY e HETZNER_HOST no repositório GitHub."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Executar deploy no servidor
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          USER="${HETZNER_USER:-root}"
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=30 \
            "${USER}@${HETZNER_HOST}" \
            'bash /opt/gerenciamento-estoque/scripts/deploy-hetzner.sh'

      - name: Verificar saúde dos containers
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          USER="${HETZNER_USER:-root}"
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            "${USER}@${HETZNER_HOST}" \
            'docker ps --format "table {{.Names}}\t{{.Status}}" | head -10'
